<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="shell-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="shell-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Body/belly (visible under shell) -->
  <ellipse cx="256" cy="300" rx="140" ry="90" fill="url(#body)"/>

  <!-- Legs -->
  <!-- Back left -->
  <ellipse cx="155" cy="340" rx="30" ry="18" fill="#6ee7b7" transform="rotate(-30 155 340)"/>
  <!-- Back right -->
  <ellipse cx="357" cy="340" rx="30" ry="18" fill="#6ee7b7" transform="rotate(30 357 340)"/>
  <!-- Front left -->
  <ellipse cx="145" cy="275" rx="32" ry="18" fill="#6ee7b7" transform="rotate(-20 145 275)"/>
  <!-- Front right -->
  <ellipse cx="367" cy="275" rx="32" ry="18" fill="#6ee7b7" transform="rotate(20 367 275)"/>

  <!-- Tail -->
  <ellipse cx="256" cy="388" rx="16" ry="12" fill="#6ee7b7"/>

  <!-- Shell (main dome) -->
  <ellipse cx="256" cy="265" rx="120" ry="100" fill="url(#shell-top)"/>

  <!-- Shell pattern - hexagonal segments -->
  <!-- Center -->
  <ellipse cx="256" cy="250" rx="35" ry="30" fill="none" stroke="url(#shell-dark)" stroke-width="3.5"/>
  <!-- Top -->
  <ellipse cx="256" cy="200" rx="30" ry="22" fill="none" stroke="url(#shell-dark)" stroke-width="3"/>
  <!-- Bottom -->
  <ellipse cx="256" cy="305" rx="30" ry="22" fill="none" stroke="url(#shell-dark)" stroke-width="3"/>
  <!-- Left -->
  <ellipse cx="208" cy="248" rx="28" ry="24" fill="none" stroke="url(#shell-dark)" stroke-width="3"/>
  <!-- Right -->
  <ellipse cx="304" cy="248" rx="28" ry="24" fill="none" stroke="url(#shell-dark)" stroke-width="3"/>
  <!-- Top-left -->
  <ellipse cx="218" cy="208" rx="24" ry="18" fill="none" stroke="url(#shell-dark)" stroke-width="2.5"/>
  <!-- Top-right -->
  <ellipse cx="294" cy="208" rx="24" ry="18" fill="none" stroke="url(#shell-dark)" stroke-width="2.5"/>

  <!-- Head -->
  <ellipse cx="256" cy="175" rx="48" ry="44" fill="url(#body)"/>

  <!-- Eyes -->
  <circle cx="238" cy="163" r="14" fill="white"/>
  <circle cx="274" cy="163" r="14" fill="white"/>
  <circle cx="240" cy="161" r="8" fill="#1e293b"/>
  <circle cx="276" cy="161" r="8" fill="#1e293b"/>
  <!-- Eye highlights -->
  <circle cx="243" cy="158" r="3" fill="white"/>
  <circle cx="279" cy="158" r="3" fill="white"/>

  <!-- Smile -->
  <path d="M 240 180 Q 256 194 272 180" fill="none" stroke="#065f46" stroke-width="3" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="226" cy="178" rx="10" ry="6" fill="#f9a8d4" opacity="0.4"/>
  <ellipse cx="286" cy="178" rx="10" ry="6" fill="#f9a8d4" opacity="0.4"/>
</svg>
